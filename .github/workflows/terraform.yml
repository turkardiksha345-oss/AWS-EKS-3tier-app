name: EKS Infra + App Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  CLUSTER_NAME: my-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # ✅ 2. Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ✅ 3. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # ✅ 4. Terraform Init
    - name: Terraform Init
      run: terraform init
      working-directory: Terraform-eks

    # 4. Terraform plan
    - name: Terraform Plan
      run: terraform plan
      working-directory: Terraform-eks

    # ✅ 5. Terraform Apply (Create EKS)
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: Terraform-eks

    # ✅ 6. Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # ✅ 7. Build & Push Backend Image
    - name: Build & Push Backend
      run: |

        docker build -t ${{ secrets.DOCKER_USERNAME }}/easy-crud-backend:latest ./Application/backend
        docker push ${{ secrets.DOCKER_USERNAME }}/easy-crud-backend:latest

    # ✅ 8. Build & Push Frontend Image
    - name: Build & Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easy-crud-frontend:latest ./Application/frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/easy-crud-frontend:latest

     # Install kubectl
    - name: Install kubectl
      run: |
        curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.29.0/2024-01-04/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # ✅ 9. Update kubeconfig (Connect to EKS)
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

    # ✅ 10. Deploy to Kubernetes
    - name: Deploy Application
      run: |
        kubectl apply -f Application/yaml/
        kubectl apply -f Application/backend/yaml/
        kubectl apply -f Application/frontend/yaml/