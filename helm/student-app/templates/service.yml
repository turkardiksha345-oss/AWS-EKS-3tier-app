apiVersion: v1
kind: Service
metadata:
  name: student-app-frontend-svc
  labels:
    app: student-app-frontend
spec:
  type: LoadBalancer
  selector:
    app: student-app-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  name: student-app-backend-svc
  labels:
    app: student-app-backend
spec:
  type: NodePort
  selector:
    app: student-app-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  name: student-db-svc
  labels:
    app: student-db
spec:
  clusterIP: None
  selector:
    app: student-db
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP