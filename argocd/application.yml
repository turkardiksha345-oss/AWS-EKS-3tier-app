apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/turkardiksha345-oss/AWS-EKS-3tier-app
    targetRevision: HEAD
    path: helm/student-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true